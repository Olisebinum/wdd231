<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100" role="img">
  <title>OE monogram logo for Olise Ebinum</title>
  <desc>Interlocking O and E letters with a diagonal copper slash accent on a navy circular badge</desc>

  <!-- Outer ring -->
  <circle cx="50" cy="50" r="48" fill="#0a1628"/>
  <circle cx="50" cy="50" r="46" fill="none" stroke="#b87333" stroke-width="1.8"/>

  <!-- O letter -->
  <text x="16" y="68" font-family="Georgia, serif" font-size="62" font-weight="700" fill="#ffffff" opacity="0.93">O</text>

  <!-- E letter in copper -->
  <text x="44" y="68" font-family="Georgia, serif" font-size="62" font-weight="700" fill="#b87333">E</text>

  <!-- Diagonal slash accent -->
  <line x1="74" y1="18" x2="52" y2="82" stroke="#b87333" stroke-width="3" stroke-linecap="round"/>
  <line x1="76" y1="18" x2="54" y2="82" stroke="#d4915a" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
</svg>
