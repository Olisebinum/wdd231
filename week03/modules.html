<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WDD 231 - Course Enrollment Modules</title>
  <link rel="stylesheet" href="styles/modules.css" />
</head>
<body>

  <main class="course-card">
    <h1 id="courseTitle">Web Frontend Development I</h1>
    <p id="courseCode">WDD231</p>

    <section class="enrollment-box">
      <label for="sectionNumber">Choose a section:
        <select id="sectionNumber">
          <option value="">--</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
        </select>
      </label>

      <button id="enrollStudent">Enroll a Student</button>
      <button id="dropStudent">Drop a Student</button>
    </section>

    <table id="sectionsTable">
      <thead>
        <tr>
          <th>Section</th>
          <th>Enrolled</th>
          <th>Instructor</th>
        </tr>
      </thead>
      <tbody id="sectionsBody">
        <!-- Rows rendered dynamically by output.mjs -->
      </tbody>
    </table>
  </main>

  <script type="module" src="scripts/modules.mjs"></script>
</body>
</html>
